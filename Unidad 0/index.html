<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navegar la incertidumbre — consorcio de agujeros negros</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0b12; }
  canvas { display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>

// ================= CONFIG =================
const ASPECT_W = 9;
const ASPECT_H = 16;
const N_WALKERS = 150;

const STEP_MEAN = 1.6;
const STEP_SD = 0.6;

// En vez de fijar "probabilidad por partícula por frame" directamente,
// se fija cuántos eventos de disrupción de marea se quieren VER en total,
// por segundo, en todo el sistema. JUMP_PROB se calcula a partir de esto
// en setup(), dividiendo entre N_WALKERS y el framerate (~60 fps).
// Así, si más adelante cambian N_WALKERS, la frecuencia percibida NO cambia.
const JUMP_EVENTS_PER_SECOND = 0.3; // ≈ un evento visible cada ~3.3 segundos
const JUMP_SIZE = 90;
let JUMP_PROB; // calculado en setup()

const MAX_TENDENCY_PROB = 0.5;
const NOISE_STEP = 0.003;
const WOBBLE_RANGE = 0.5;

const PRESENCE_RISE = 0.03;
const PRESENCE_DECAY = 0.985;

const TRAIL_ALPHA = 20;

const EVENT_HORIZON_FRACTION = 0.045;
const GLOW_LAYERS = 4;

let walkers = [];
let presence = 0;
let cw, ch;
let horizonR;

class Walker {
  constructor() {
    this.x = random(cw);
    this.y = random(ch);
    this.tx = random(1000);
    this.ty = random(1000) + 10000;

    this.isJump = false;
    this.streakX0 = this.x;
    this.streakY0 = this.y;
    this.streakX1 = this.x;
    this.streakY1 = this.y;
  }

  step() {
    let r = random(1);
    let prevX = this.x;
    let prevY = this.y;
    this.isJump = false;

    if (r < JUMP_PROB) {
      // ---------- EXCEPCIÓN / disrupción de marea ----------
      this.isJump = true;
      this.x += random(-JUMP_SIZE, JUMP_SIZE);
      this.y += random(-JUMP_SIZE, JUMP_SIZE);

    } else if (r < JUMP_PROB + presence * MAX_TENDENCY_PROB) {
      // ---------- TENDENCIA / atracción gravitacional ----------
      let toCenter = atan2(ch / 2 - this.y, cw / 2 - this.x);
      let n = noise(this.tx, this.ty);
      let wobble = map(n, 0, 1, -WOBBLE_RANGE, WOBBLE_RANGE);
      let heading = toCenter + wobble;
      this.x += cos(heading) * STEP_MEAN;
      this.y += sin(heading) * STEP_MEAN;
      this.tx += NOISE_STEP;
      this.ty += NOISE_STEP;

    } else {
      // ---------- POSIBILIDAD + NORMALIDAD / materia dispersa ----------
      let dir = random(TWO_PI);
      let len = max(0.1, randomGaussian(STEP_MEAN, STEP_SD));
      this.x += cos(dir) * len;
      this.y += sin(dir) * len;
    }

    this.streakX0 = prevX;
    this.streakY0 = prevY;
    this.streakX1 = this.x;
    this.streakY1 = this.y;

    // ---------- HORIZONTE DE EVENTOS ----------
    let dCenter = dist(this.x, this.y, cw / 2, ch / 2);
    if (dCenter < horizonR) {
      this.isJump = false;
      this.x = random(cw);
      this.y = random(ch);
      this.streakX0 = this.x;
      this.streakY0 = this.y;
      this.streakX1 = this.x;
      this.streakY1 = this.y;
      return;
    }

    if (this.x < 0) this.x += cw;
    if (this.x > cw) this.x -= cw;
    if (this.y < 0) this.y += ch;
    if (this.y > ch) this.y -= ch;
  }

  show() {
    if (this.isJump) {
      stroke(255, 245, 210, 80);
      strokeWeight(4);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      stroke(255, 250, 230, 230);
      strokeWeight(1.2);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      noStroke();
      fill(255, 255, 245);
      circle(this.streakX1, this.streakY1, 3.5);

    } else {
      noStroke();
      let bri = 190 + presence * 50;
      fill(bri, 210 - presence * 40, 255, 150);
      circle(this.x, this.y, 2.2);
    }
  }
}

function setup() {
  let d = fitCanvasSize();
  createCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  pixelDensity(1);
  background(11, 11, 18);
  updateHorizon();

  noiseSeed(random(100000));
  randomSeed(random(100000));

  // probabilidad por partícula, por frame, derivada de la tasa deseada
  // a nivel de todo el sistema (asumiendo ~60 fps, el default de p5.js)
  JUMP_PROB = JUMP_EVENTS_PER_SECOND / (60 * N_WALKERS);

  for (let i = 0; i < N_WALKERS; i++) {
    walkers.push(new Walker());
  }
}

function windowResized() {
  let d = fitCanvasSize();
  resizeCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  background(11, 11, 18);
  updateHorizon();
}

function fitCanvasSize() {
  let targetRatio = ASPECT_W / ASPECT_H;
  let w = windowWidth, h = windowHeight;
  if (w / h > targetRatio) w = h * targetRatio;
  else h = w / targetRatio;
  return { w: floor(w), h: floor(h) };
}

function updateHorizon() {
  horizonR = min(cw, ch) * EVENT_HORIZON_FRACTION;
}

function updatePresence() {
  let active = mouseIsPressed;
  if (active) presence = min(1, presence + PRESENCE_RISE);
  else presence *= PRESENCE_DECAY;
}

function drawBlackHole() {
  noStroke();
  for (let i = GLOW_LAYERS; i >= 1; i--) {
    let r = horizonR * 1.8 + i * horizonR * 0.55;
    fill(255, 170, 90, 16);
    circle(cw / 2, ch / 2, r);
  }
  fill(6, 4, 9);
  circle(cw / 2, ch / 2, horizonR * 1.5);
}

function draw() {
  noStroke();
  fill(11, 11, 18, TRAIL_ALPHA);
  rect(0, 0, cw, ch);

  updatePresence();

  for (let w of walkers) {
    w.step();
    w.show();
  }

  drawBlackHole();
}

</script>
</body>
</html>
