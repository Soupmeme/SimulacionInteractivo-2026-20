<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navegar la incertidumbre — máquina de estados (orgánica, con masa)</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0b12; }
  canvas { display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>

// ================= CONFIG =================
const ASPECT_W = 9;
const ASPECT_H = 16;
const N_WALKERS = 150;

const STEP_MEAN = 1.6;
const STEP_SD = 0.6;

const POSIB_MIN = 0.6;
const POSIB_MAX = 4.5;

const WOBBLE_RANGE = 0.5;
const INFLUENCIA_WOBBLE_MULT = 0.35;
const INFLUENCIA_STEP_MULT = 1.4;
const NOISE_STEP = 0.003;

const JUMP_SIZE = 90;
const EXCEPTION_EVENTS_PER_SECOND = 4;
let EXCEPTION_JUMP_PROB;

const TRAIL_ALPHA = 20;
const EVENT_HORIZON_FRACTION = 0.045;
const GLOW_LAYERS = 4;

// ---- máquina de estados (nivel sistema) ----
const STATE_WEIGHTS = { posibilidad: 3, normalidad: 3, tendencia: 3, excepcion: 1 };
const STATE_DURATION_SEC = {
  posibilidad: [4, 7],
  normalidad: [4, 7],
  tendencia: [5, 8],
  excepcion: [1.5, 2.5]
};
const STATE_COLOR = {
  posibilidad: [230, 230, 255],
  normalidad: [170, 190, 230],
  tendencia: [190, 160, 255],
  excepcion: [255, 220, 180],
  influencia: [255, 205, 150]
};

// ---- adopción escalonada ----
const AUTONOMOUS_STAGGER_FRAMES = 75;
const INFLUENCIA_STAGGER_FRAMES = 18;
const STAGGER_JITTER = 20;
const PERSONALITY_MIN = 0.75;
const PERSONALITY_MAX = 1.3;

// ---- masa: variación entre "estrellas" ----
const MASS_MIN = 0.7;
const MASS_MAX = 1.6;
const SIZE_MIN = 1.6;         // diámetro visual, sutil
const SIZE_MAX = 3.0;
const ALPHA_MIN = 120;
const ALPHA_MAX = 190;
const PULL_MASS_MIN = 0.9;    // qué tan más/menos fuerte cae hacia el centro
const PULL_MASS_MAX = 1.25;
const WOBBLE_MASS_MIN = 0.75; // más masa = menos desvío (cae más "derecho")
const WOBBLE_MASS_MAX = 1.15;
const JUMP_MASS_MIN = 0.8;    // más masa = más resistencia al salto de excepción
const JUMP_MASS_MAX = 1.15;

let state = 'posibilidad';
let stateTimer = 0;

let walkers = [];
let cw, ch;
let horizonR;
let maxDistFromCenter;

class Walker {
  constructor() {
    this.x = random(cw);
    this.y = random(ch);
    this.tx = random(1000);
    this.ty = random(1000) + 10000;

    this.personality = random(PERSONALITY_MIN, PERSONALITY_MAX);

    // masa: fija a esta estrella, deriva tamaño, brillo y cómo responde a la gravedad
    this.mass = random(MASS_MIN, MASS_MAX);
    this.size = map(this.mass, MASS_MIN, MASS_MAX, SIZE_MIN, SIZE_MAX);
    this.alpha = map(this.mass, MASS_MIN, MASS_MAX, ALPHA_MIN, ALPHA_MAX);
    this.pullMult = map(this.mass, MASS_MIN, MASS_MAX, PULL_MASS_MIN, PULL_MASS_MAX);
    // rangos de salida invertidos a propósito: a más masa, MENOS wobble y MENOS desplazamiento por salto
    this.wobbleMult = map(this.mass, MASS_MIN, MASS_MAX, WOBBLE_MASS_MAX, WOBBLE_MASS_MIN);
    this.jumpMult = map(this.mass, MASS_MIN, MASS_MAX, JUMP_MASS_MAX, JUMP_MASS_MIN);

    this.behaviorState = state;
    this.knownGlobalState = state;
    this.adoptAt = 0;

    this.isJump = false;
    this.streakX0 = this.x;
    this.streakY0 = this.y;
    this.streakX1 = this.x;
    this.streakY1 = this.y;
  }

  step() {
    if (state !== this.knownGlobalState) {
      this.knownGlobalState = state;
      let d = dist(this.x, this.y, cw / 2, ch / 2);
      let staggerMax = (state === 'influencia') ? INFLUENCIA_STAGGER_FRAMES : AUTONOMOUS_STAGGER_FRAMES;
      let lag = map(d, 0, maxDistFromCenter, 0, staggerMax);
      this.adoptAt = frameCount + lag + random(-STAGGER_JITTER, STAGGER_JITTER);
    }
    if (frameCount >= this.adoptAt) {
      this.behaviorState = state;
    }

    let prevX = this.x;
    let prevY = this.y;
    this.isJump = false;

    let jumpProb = (this.behaviorState === 'excepcion') ? EXCEPTION_JUMP_PROB : 0;

    if (jumpProb > 0 && random(1) < jumpProb) {
      // ---------- disrupción de marea (más masa = más resistencia) ----------
      this.isJump = true;
      this.x += random(-JUMP_SIZE, JUMP_SIZE) * this.jumpMult;
      this.y += random(-JUMP_SIZE, JUMP_SIZE) * this.jumpMult;

    } else if (this.behaviorState === 'tendencia' || this.behaviorState === 'influencia') {
      // ---------- atracción gravitacional (más masa = más directa) ----------
      let toCenter = atan2(ch / 2 - this.y, cw / 2 - this.x);
      let n = noise(this.tx, this.ty);
      let baseWobble = (this.behaviorState === 'influencia') ? WOBBLE_RANGE * INFLUENCIA_WOBBLE_MULT : WOBBLE_RANGE;
      let wobbleRange = baseWobble * this.wobbleMult;
      let wobble = map(n, 0, 1, -wobbleRange, wobbleRange);
      let heading = toCenter + wobble;
      let stepLen = (this.behaviorState === 'influencia') ? STEP_MEAN * INFLUENCIA_STEP_MULT : STEP_MEAN;
      stepLen *= this.personality * this.pullMult;
      this.x += cos(heading) * stepLen;
      this.y += sin(heading) * stepLen;
      this.tx += NOISE_STEP;
      this.ty += NOISE_STEP;

    } else if (this.behaviorState === 'posibilidad') {
      // ---------- dispersión total ----------
      let dir = random(TWO_PI);
      let len = random(POSIB_MIN, POSIB_MAX) * this.personality;
      this.x += cos(dir) * len;
      this.y += sin(dir) * len;

    } else {
      // ---------- normalidad (y "excepción" cuando no le tocó saltar) ----------
      let dir = random(TWO_PI);
      let len = max(0.1, randomGaussian(STEP_MEAN, STEP_SD)) * this.personality;
      this.x += cos(dir) * len;
      this.y += sin(dir) * len;
    }

    this.streakX0 = prevX;
    this.streakY0 = prevY;
    this.streakX1 = this.x;
    this.streakY1 = this.y;

    let dCenter = dist(this.x, this.y, cw / 2, ch / 2);
    if (dCenter < horizonR) {
      this.isJump = false;
      this.x = random(cw);
      this.y = random(ch);
      this.streakX0 = this.x;
      this.streakY0 = this.y;
      this.streakX1 = this.x;
      this.streakY1 = this.y;
      return;
    }

    if (this.x < 0) this.x += cw;
    if (this.x > cw) this.x -= cw;
    if (this.y < 0) this.y += ch;
    if (this.y > ch) this.y -= ch;
  }

  show() {
    if (this.isJump) {
      stroke(255, 245, 210, 80);
      strokeWeight(4);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      stroke(255, 250, 230, 230);
      strokeWeight(1.2);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      noStroke();
      fill(255, 255, 245);
      circle(this.streakX1, this.streakY1, 3.5);

    } else {
      noStroke();
      let c = STATE_COLOR[this.behaviorState];
      fill(c[0], c[1], c[2], this.alpha);
      circle(this.x, this.y, this.size);
    }
  }
}

// ================= MÁQUINA DE ESTADOS (nivel sistema) =================

function pickNextAutonomousState(exclude) {
  let candidates = Object.keys(STATE_WEIGHTS).filter(s => s !== exclude);
  let totalWeight = candidates.reduce((sum, s) => sum + STATE_WEIGHTS[s], 0);
  let r = random(totalWeight);
  let acc = 0;
  for (let s of candidates) {
    acc += STATE_WEIGHTS[s];
    if (r < acc) return s;
  }
  return candidates[candidates.length - 1];
}

function durationFramesFor(s) {
  let [lo, hi] = STATE_DURATION_SEC[s];
  return floor(random(lo, hi) * 60);
}

function updateState() {
  if (mouseIsPressed) {
    state = 'influencia';
    return;
  }

  if (state === 'influencia') {
    state = pickNextAutonomousState(null);
    stateTimer = durationFramesFor(state);
    return;
  }

  stateTimer--;
  if (stateTimer <= 0) {
    state = pickNextAutonomousState(state);
    stateTimer = durationFramesFor(state);
  }
}

// ================= SETUP / DRAW =================

function setup() {
  let d = fitCanvasSize();
  createCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  pixelDensity(1);
  background(11, 11, 18);
  updateHorizon();

  noiseSeed(random(100000));
  randomSeed(random(100000));

  EXCEPTION_JUMP_PROB = EXCEPTION_EVENTS_PER_SECOND / (60 * N_WALKERS);

  state = random(Object.keys(STATE_WEIGHTS));
  stateTimer = durationFramesFor(state);

  for (let i = 0; i < N_WALKERS; i++) {
    walkers.push(new Walker());
  }
}

function windowResized() {
  let d = fitCanvasSize();
  resizeCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  background(11, 11, 18);
  updateHorizon();
}

function fitCanvasSize() {
  let targetRatio = ASPECT_W / ASPECT_H;
  let w = windowWidth, h = windowHeight;
  if (w / h > targetRatio) w = h * targetRatio;
  else h = w / targetRatio;
  return { w: floor(w), h: floor(h) };
}

function updateHorizon() {
  horizonR = min(cw, ch) * EVENT_HORIZON_FRACTION;
  maxDistFromCenter = dist(0, 0, cw / 2, ch / 2);
}

function drawBlackHole() {
  let activePull = (state === 'tendencia' || state === 'influencia');
  let glowAlpha = activePull ? 26 : 14;

  noStroke();
  for (let i = GLOW_LAYERS; i >= 1; i--) {
    let r = horizonR * 1.8 + i * horizonR * 0.55;
    fill(255, 170, 90, glowAlpha);
    circle(cw / 2, ch / 2, r);
  }
  fill(6, 4, 9);
  circle(cw / 2, ch / 2, horizonR * 1.5);
}

function draw() {
  noStroke();
  fill(11, 11, 18, TRAIL_ALPHA);
  rect(0, 0, cw, ch);

  updateState();

  for (let w of walkers) {
    w.step();
    w.show();
  }

  drawBlackHole();
}

</script>
</body>
</html>
