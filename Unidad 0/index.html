<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navegar la incertidumbre — cielo nocturno</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0b12; }
  canvas { display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>

// ================= CONFIG =================
const ASPECT_W = 9;
const ASPECT_H = 16;
const N_WALKERS = 150;

const STEP_MEAN = 1.6;
const STEP_SD = 0.6;

const JUMP_PROB = 0.012;        // "estrella fugaz": probabilidad fija, no depende de presence
const JUMP_SIZE = 90;

const MAX_TENDENCY_PROB = 0.5;
const NOISE_STEP = 0.003;

const PRESENCE_RISE = 0.03;
const PRESENCE_DECAY = 0.985;

const TRAIL_ALPHA = 20;

let walkers = [];
let presence = 0;
let cw, ch;

class Walker {
  constructor() {
    this.x = random(cw);
    this.y = random(ch);
    this.tx = random(1000);
    this.ty = random(1000) + 10000;

    this.isJump = false;
    // puntos de inicio/fin del "trazo" de este frame, usados solo por show()
    this.streakX0 = this.x;
    this.streakY0 = this.y;
    this.streakX1 = this.x;
    this.streakY1 = this.y;
  }

  step() {
    let r = random(1);
    let prevX = this.x;
    let prevY = this.y;
    this.isJump = false;

    if (r < JUMP_PROB) {
      // ---------- EXCEPCIÓN / estrella fugaz ----------
      this.isJump = true;
      this.x += random(-JUMP_SIZE, JUMP_SIZE);
      this.y += random(-JUMP_SIZE, JUMP_SIZE);

    } else if (r < JUMP_PROB + presence * MAX_TENDENCY_PROB) {
      // ---------- TENDENCIA / corriente ----------
      let n = noise(this.tx, this.ty);
      let heading = map(n, 0, 1, 0, TWO_PI);
      this.x += cos(heading) * STEP_MEAN;
      this.y += sin(heading) * STEP_MEAN;
      this.tx += NOISE_STEP;
      this.ty += NOISE_STEP;

    } else {
      // ---------- POSIBILIDAD + NORMALIDAD / polvo cósmico ----------
      let dir = random(TWO_PI);
      let len = max(0.1, randomGaussian(STEP_MEAN, STEP_SD));
      this.x += cos(dir) * len;
      this.y += sin(dir) * len;
    }

    // guardamos el trazo ANTES de envolver bordes, para que la estela
    // se dibuje en línea recta y no cruce toda la pantalla si hubo wrap
    this.streakX0 = prevX;
    this.streakY0 = prevY;
    this.streakX1 = this.x;
    this.streakY1 = this.y;

    // el mundo es un toroide: sale por un borde, entra por el opuesto
    if (this.x < 0) this.x += cw;
    if (this.x > cw) this.x -= cw;
    if (this.y < 0) this.y += ch;
    if (this.y > ch) this.y -= ch;
  }

  show() {
    if (this.isJump) {
      // estela: un trazo ancho y tenue (glow) + uno fino y brillante (núcleo)
      stroke(255, 245, 210, 80);
      strokeWeight(4);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      stroke(255, 250, 230, 230);
      strokeWeight(1.2);
      line(this.streakX0, this.streakY0, this.streakX1, this.streakY1);

      noStroke();
      fill(255, 255, 245);
      circle(this.streakX1, this.streakY1, 3.5);

    } else {
      noStroke();
      let bri = 190 + presence * 50;
      fill(bri, 210 - presence * 40, 255, 150);
      circle(this.x, this.y, 2.2);
    }
  }
}

function setup() {
  let d = fitCanvasSize();
  createCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  pixelDensity(1);
  background(11, 11, 18);

  noiseSeed(random(100000));
  randomSeed(random(100000));

  for (let i = 0; i < N_WALKERS; i++) {
    walkers.push(new Walker());
  }
}

function windowResized() {
  let d = fitCanvasSize();
  resizeCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  background(11, 11, 18);
}

function fitCanvasSize() {
  let targetRatio = ASPECT_W / ASPECT_H;
  let w = windowWidth, h = windowHeight;
  if (w / h > targetRatio) w = h * targetRatio;
  else h = w / targetRatio;
  return { w: floor(w), h: floor(h) };
}

function updatePresence() {
  let active = mouseIsPressed;
  if (active) presence = min(1, presence + PRESENCE_RISE);
  else presence *= PRESENCE_DECAY;
}

function draw() {
  noStroke();
  fill(11, 11, 18, TRAIL_ALPHA);
  rect(0, 0, cw, ch);

  updatePresence();

  for (let w of walkers) {
    w.step();
    w.show();
  }
}

</script>
</body>
</html>
