<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navegar la incertidumbre — basado en Nature of Code, Cap. 0</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0b12; }
  canvas { display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>

// ================= CONFIG =================
const ASPECT_W = 9;
const ASPECT_H = 16;
const N_WALKERS = 150;

const STEP_MEAN = 1.6;          // paso "típico" (normalidad)
const STEP_SD = 0.6;            // qué tan apretada es la campana (normalidad)

const JUMP_PROB = 0.012;        // probabilidad constante de un salto grande (excepción)
const JUMP_SIZE = 90;           // qué tan lejos llega el salto

const MAX_TENDENCY_PROB = 0.5;  // techo de probabilidad de "tendencia" cuando presence = 1
const NOISE_STEP = 0.003;       // qué tan rápido avanza el offset de ruido

const PRESENCE_RISE = 0.03;
const PRESENCE_DECAY = 0.985;

const TRAIL_ALPHA = 20;         // menor = colas más largas

let walkers = [];
let presence = 0; // 0 = solo posibilidad/normalidad, 1 = tendencia fuerte y sostenida
let cw, ch;

// ---------------------------------------------------------------
// Walker: misma estructura de clase que el libro (constructor + step + show),
// pero step() ahora elige entre TRES comportamientos posibles cada frame,
// como en el ejemplo del libro que elige entre "Sing/Dance/Sleep" según
// en qué rango cae random(1).
// ---------------------------------------------------------------
class Walker {
  constructor() {
    this.x = random(cw);
    this.y = random(ch);
    // dos offsets de ruido 1D independientes, igual que this.tx / this.ty
    // en el Example 0.6 del libro (para que x e y no queden pegados)
    this.tx = random(1000);
    this.ty = random(1000) + 10000;
  }

  step() {
    let r = random(1);

    if (r < JUMP_PROB) {
      // ---------- EXCEPCIÓN ----------
      // Probabilidad baja y CONSTANTE, independiente de presence.
      // Un evento improbable que puede pasar en cualquier momento.
      this.x += random(-JUMP_SIZE, JUMP_SIZE);
      this.y += random(-JUMP_SIZE, JUMP_SIZE);

    } else if (r < JUMP_PROB + presence * MAX_TENDENCY_PROB) {
      // ---------- TENDENCIA ----------
      // Este rango solo existe (y crece) cuando hay presencia del visitante.
      // La dirección viene de ruido Perlin, así que la "preferencia repetida"
      // se ve suave y coherente, no errática.
      let n = noise(this.tx, this.ty);
      let heading = map(n, 0, 1, 0, TWO_PI);
      this.x += cos(heading) * STEP_MEAN;
      this.y += sin(heading) * STEP_MEAN;
      this.tx += NOISE_STEP;
      this.ty += NOISE_STEP;

    } else {
      // ---------- POSIBILIDAD + NORMALIDAD ----------
      // El caso de todos los días: cualquier dirección es posible (uniforme),
      // pero el TAMAÑO del paso sigue una distribución normal (randomGaussian),
      // igual que el Exercise 0.5 del libro ("Gaussian random walk").
      let dir = random(TWO_PI);
      let len = max(0.1, randomGaussian(STEP_MEAN, STEP_SD));
      this.x += cos(dir) * len;
      this.y += sin(dir) * len;
    }

    // el mundo es un toroide: sale por un borde, entra por el opuesto
    if (this.x < 0) this.x += cw;
    if (this.x > cw) this.x -= cw;
    if (this.y < 0) this.y += ch;
    if (this.y > ch) this.y -= ch;
  }

  show() {
    noStroke();
    let bri = 190 + presence * 50;
    fill(bri, 210 - presence * 40, 255, 150);
    circle(this.x, this.y, 2.2);
  }
}

function setup() {
  let d = fitCanvasSize();
  createCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  pixelDensity(1);
  background(11, 11, 18);

  noiseSeed(random(100000));
  randomSeed(random(100000));

  for (let i = 0; i < N_WALKERS; i++) {
    walkers.push(new Walker());
  }
}

function windowResized() {
  let d = fitCanvasSize();
  resizeCanvas(d.w, d.h);
  cw = d.w; ch = d.h;
  background(11, 11, 18);
}

function fitCanvasSize() {
  let targetRatio = ASPECT_W / ASPECT_H;
  let w = windowWidth, h = windowHeight;
  if (w / h > targetRatio) w = h * targetRatio;
  else h = w / targetRatio;
  return { w: floor(w), h: floor(h) };
}

function updatePresence() {
  // INFLUENCIA: el visitante mueve una probabilidad (el techo de "tendencia"),
  // nunca una posición. Decae solo -> el sistema no depende de que alguien
  // esté tocando la pantalla para seguir vivo.
  let active = (touches.length > 0) || mouseIsPressed;
  if (active) presence = min(1, presence + PRESENCE_RISE);
  else presence *= PRESENCE_DECAY;
}

function draw() {
  noStroke();
  fill(11, 11, 18, TRAIL_ALPHA);
  rect(0, 0, cw, ch);

  updatePresence();

  for (let w of walkers) {
    w.step();
    w.show();
  }
}

function touchStarted() { return false; }
function touchMoved() { return false; }

</script>
</body>
</html>
